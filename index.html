<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dennis' Sportscard Binder</title>

  <style>
    body {
      margin: 0;
      background: #1f1b18;
      color: #f4efe7;
      font-family: Georgia, serif;
      text-align: center;
    }

    header {
      padding: 30px 20px 10px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      font-weight: normal;
    }

    .subtitle {
      color: #c9bda8;
      margin-top: 8px;
    }

    .binder {
      max-width: 760px;
      margin: 30px auto;
      padding: 24px;
      background: #2b2420;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .page {
      position: relative;
      background: #eee;
      padding: 18px;
      border-radius: 8px;
    }

    .page img {
      width: 100%;
      display: block;
    }

    .sticker {
      position: absolute;
      background: #ffe66d;
      color: #111;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 18px;
      padding: 8px 10px;
      transform: rotate(-8deg);
      box-shadow: 2px 2px 4px rgba(0,0,0,.25);
    }

    .s1 { top: 9%; left: 9%; }
    .s2 { top: 9%; left: 43%; }
    .s3 { top: 9%; right: 9%; }
    .s4 { top: 42%; left: 9%; }
    .s5 { top: 42%; left: 43%; }
    .s6 { top: 42%; right: 9%; }
    .s7 { bottom: 10%; left: 9%; }
    .s8 { bottom: 10%; left: 43%; }
    .s9 { bottom: 10%; right: 9%; }

    .nav {
      margin-top: 20px;
      font-family: Arial, sans-serif;
    }

    button {
      background: #f4efe7;
      border: 0;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      max-width: 620px;
      margin: 20px auto 40px;
      color: #c9bda8;
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <header>
    <h1>Trade Binder</h1>
    <div class="subtitle">A messy little flip through of cards I'd like to trade.</div>
  </header>

  <main class="binder">
    <div class="page">
      <img src="binder_sample.jpg" alt="Binder page of baseball cards">

      <div class="sticker s1">$2</div>
      <div class="sticker s2">RC</div>
      <div class="sticker s3">$3</div>
      <div class="sticker s4">FT</div>
      <div class="sticker s5">$1</div>
      <div class="sticker s6">PC?</div>
      <div class="sticker s7">$2</div>
      <div class="sticker s8">RC</div>
      <div class="sticker s9">$5</div>
    </div>

    <div class="nav">
      <button>← Previous</button>
      <span style="margin: 0 15px;">Page 1</span>
      <button>Next →</button>
    </div>
  </main>

  <p class="note">
    Looking for star rookies, weird 90s inserts, numbered cards, and anything fun.
    Make me an offer.
  </p>
<script>

  document.querySelectorAll('.sticker').forEach(sticker => {

    sticker.onpointerdown = e => {

      sticker.setPointerCapture(e.pointerId);

      const startX = e.clientX;

      const startY = e.clientY;

      const rect = sticker.getBoundingClientRect();

      sticker.onpointermove = e => {

        sticker.style.left = rect.left + (e.clientX - startX) + 'px';

        sticker.style.top = rect.top + (e.clientY - startY) + 'px';

        sticker.style.right = 'auto';

        sticker.style.bottom = 'auto';

        sticker.style.position = 'fixed';

      };

      sticker.onpointerup = () => {

        sticker.onpointermove = null;

      };

    };

  });

</script>
</body>
</html>
